name: Helm Chart

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - deploy/helm/**
      - Chart.yaml
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Helm chart
        run: |
          helm package deploy/helm/servasec \
            --destination /tmp/helm-chart

      - name: Push to OCI registry
        run: |
          helm push /tmp/helm-chart/servasec-*.tgz \
            oci://ghcr.io/${{ github.repository }}/helm
