name: Docker Pro Images
on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
permissions:
  contents: read
  packages: write
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PRO_APP_ID: ${{ secrets.PRO_APP_ID }}
    steps:
      - uses: actions/checkout@v4
      - name: Generate app token
        id: app-token
        if: ${{ env.PRO_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PRO_APP_ID }}
          private-key: ${{ secrets.PRO_APP_PRIVATE_KEY }}
          owner: servasec
          repositories: servasec-pro
      - name: Checkout pro module
        if: ${{ env.PRO_APP_ID != '' }}
        uses: actions/checkout@v4
        with:
          repository: servasec/servasec-pro
          token: ${{ steps.app-token.outputs.token }}
          path: pro
      - name: Copy pro files
        if: ${{ env.PRO_APP_ID != '' }}
        run: |
          cp pro/backend/pro/impl_*.go backend/pro/
      - name: Set up Docker Buildx
        if: ${{ env.PRO_APP_ID != '' }}
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        if: ${{ env.PRO_APP_ID != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        if: ${{ env.PRO_APP_ID != '' }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/backend-pro
          tags: |
            type=raw,value=latest,enable=true
            type=sha,prefix=,suffix=,format=short
            type=semver,pattern={{version}},enable=${{ github.event_name == 'release' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'release' }}
      - name: Build and push
        if: ${{ env.PRO_APP_ID != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: prod
          build-args: BUILD_TAGS=pro
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max