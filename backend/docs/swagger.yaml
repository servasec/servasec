basePath: /
definitions:
  controllers.CompareResult:
    properties:
      fixed:
        items:
          $ref: '#/definitions/models.Finding'
        type: array
      from:
        $ref: '#/definitions/models.ApplicationVersion'
      new:
        items:
          $ref: '#/definitions/models.Finding'
        type: array
      stillPresent:
        items:
          $ref: '#/definitions/models.Finding'
        type: array
      to:
        $ref: '#/definitions/models.ApplicationVersion'
    type: object
  controllers.DashboardStats:
    properties:
      adminUsers:
        type: integer
      avgRiskScore:
        type: number
      bannedUsers:
        type: integer
      byScanner:
        items:
          $ref: '#/definitions/controllers.ScannerCount'
        type: array
      bySeverity:
        items:
          $ref: '#/definitions/controllers.SeverityCount'
        type: array
      byStatus:
        items:
          $ref: '#/definitions/controllers.StatusCount'
        type: array
      memberUsers:
        type: integer
      myOpenFindings:
        type: integer
      overdueFindings:
        type: integer
      recentScans:
        type: integer
      registeredAt:
        type: string
      riskDistribution:
        items:
          $ref: '#/definitions/pro.RiskBucket'
        type: array
      topFindings:
        items:
          $ref: '#/definitions/controllers.TopFinding'
        type: array
      topRiskyFindings:
        items:
          $ref: '#/definitions/pro.TopRiskyFinding'
        type: array
      totalFindings:
        type: integer
      totalUsers:
        type: integer
    type: object
  controllers.PermissionPolicy:
    properties:
      action:
        type: string
      id:
        type: integer
      resource:
        type: string
      subject:
        type: string
    type: object
  controllers.ScannerCount:
    properties:
      count:
        type: integer
      scannerType:
        type: string
    type: object
  controllers.SeverityCount:
    properties:
      count:
        type: integer
      severity:
        type: string
    type: object
  controllers.StatusCount:
    properties:
      count:
        type: integer
      status:
        type: string
    type: object
  controllers.TopFinding:
    properties:
      count:
        type: integer
      ruleId:
        type: string
      title:
        type: string
    type: object
  dto.LoginInput:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  dto.RegisterInput:
    properties:
      email:
        maxLength: 254
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      username:
        maxLength: 32
        type: string
    required:
    - email
    - password
    - username
    type: object
  gin.H:
    additionalProperties: {}
    type: object
  models.Application:
    properties:
      assetCriticality:
        type: string
      createdAt:
        type: string
      description:
        type: string
      groupId:
        type: integer
      id:
        type: integer
      name:
        type: string
      repositoryUrl:
        type: string
      slug:
        type: string
      updatedAt:
        type: string
      versions:
        items:
          $ref: '#/definitions/models.ApplicationVersion'
        type: array
    type: object
  models.ApplicationVersion:
    properties:
      applicationId:
        type: integer
      branch:
        type: string
      createdAt:
        type: string
      id:
        type: integer
      isDefault:
        type: boolean
      name:
        type: string
      tag:
        type: string
      updatedAt:
        type: string
    type: object
  models.Comment:
    properties:
      body:
        type: string
      createdAt:
        type: string
      findingId:
        type: integer
      id:
        type: integer
      user:
        $ref: '#/definitions/models.User'
      userId:
