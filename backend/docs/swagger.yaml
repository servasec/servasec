    type: object
  models.Finding:
    properties:
      applicationVersion:
        $ref: '#/definitions/models.ApplicationVersion'
      applicationVersionId:
        type: integer
      assignedTo:
        type: integer
      assignedToUser:
        $ref: '#/definitions/models.User'
      createdAt:
        type: string
      cweId:
        type: string
      dedupeHash:
        type: string
      description:
        type: string
      dueDate:
        type: string
      epssScore:
        type: number
      filePath:
        type: string
      fixedAt:
        type: string
      id:
        type: integer
      lineEnd:
        type: integer
      lineStart:
        type: integer
      remediation:
        type: string
      reviewedBy:
        type: integer
      reviewedByUser:
        $ref: '#/definitions/models.User'
      riskScore:
        type: number
      ruleId:
        type: string
      scanId:
        type: integer
      scannerType:
        $ref: '#/definitions/models.ScannerType'
      scannerTypeId:
        type: integer
      severity:
        type: string
      status:
        type: string
      title:
        type: string
      updatedAt:
        type: string
    type: object
  models.Group:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      path:
        type: string
      updatedAt:
        type: string
    type: object
  models.Policy:
    properties:
      actions:
        type: string
      conditions:
        type: string
      createdAt:
        type: string
      description:
        type: string
      eventTypes:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      name:
        type: string
      priority:
        type: integer
      scopeType:
        type: string
      scopeValue:
        type: string
      updatedAt:
        type: string
    type: object
  models.PolicyLog:
    properties:
      actionResult:
        type: string
      actionType:
        type: string
      conditionsMet:
        type: boolean
      createdAt:
        type: string
      detail:
        type: string
      eventType:
        type: string
      findingId:
        type: integer
      id:
        type: integer
      policyId:
        type: integer
    type: object
  models.Scan:
    properties:
      applicationVersion:
        $ref: '#/definitions/models.ApplicationVersion'
      applicationVersionId:
        type: integer
      completedAt:
        type: string
      createdAt:
        type: string
      findingsCount:
        type: integer
      id:
        type: integer
      rawResults:
        type: string
      scannerType:
        $ref: '#/definitions/models.ScannerType'
      scannerTypeId:
        type: integer
      startedAt:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    type: object
  models.ScannerType:
    properties:
      createdAt:
        type: string
      description:
        type: string
      enabled:
        type: boolean
      id:
        type: integer
      name:
        type: string
      parser:
        type: string
      updatedAt:
        type: string
    type: object
  models.Team:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: integer
      memberCount:
        type: integer
      name:
        type: string
      updatedAt:
        type: string
    type: object
  models.User:
    properties:
      avatarUrl:
        type: string
      banned:
        type: boolean
      createdAt:
        type: string
      email:
        type: string
      id:
        type: integer
      oauthId:
        type: string
      oauthProvider:
        type: string
      role:
        type: string
      updatedAt:
        type: string
      username:
        type: string
    type: object
  models.Webhook:
    properties:
      applicationId:
        type: integer
      createdAt:
        type: string
      events:
        type: string
      id:
        type: integer
      isActive:
        type: boolean
      secret:
        type: string
      updatedAt:
        type: string
      url:
        type: string
    type: object
  oauth.registerRequest:
    properties:
      client_name:
        type: string
      redirect_uris:
        items:
          type: string
        type: array
      token_endpoint_auth_method:
        type: string
    type: object
  pro.RiskBucket:
    properties:
      count:
        type: integer
      label:
        type: string
    type: object
  pro.TopRiskyFinding:
    properties:
      id:
        type: integer
      riskScore:
        type: number
      severity:
        type: string
      title:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@servasec.local
    name: API Support
  description: Security scanner management platform API
  title: Servasec API
  version: "1.0"
paths:
  /admin/permissions:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Subject, resource and action
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Permission revoked
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Permission not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Revoke permission
      tags:
      - Permissions
    get:
      parameters:
      - description: Filter by subject prefix
        in: query
        name: subject
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of policies
          schema:
            items:
              $ref: '#/definitions/controllers.PermissionPolicy'
            type: array
      summary: List permissions
      tags:
      - Permissions
    post:
      consumes:
      - application/json
      parameters:
      - description: Subject, resource and action
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Permission granted
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "409":
          description: Permission already exists
          schema:
            $ref: '#/definitions/gin.H'
      summary: Grant permission
      tags:
      - Permissions
  /admin/scanner-types/{id}:
    put:
      consumes:
      - application/json
      parameters:
      - description: Scanner type ID
        in: path
        name: id
        required: true
        type: string
      - description: enabled field
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated scanner type
          schema:
            $ref: '#/definitions/models.ScannerType'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Scanner type not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Update scanner type
      tags:
      - Scanner Types
  /api/ingest:
    post:
      consumes:
      - multipart/form-data
      description: Upload a scan results file. Authenticate via API token header,
        application ID in path, or application slug in path.
      parameters:
      - description: Version name
        in: formData
        name: version
        type: string
      - description: Branch name
        in: formData
        name: branch
        type: string
      - description: Scanner type name
        in: formData
        name: scannerType
        type: string
      - description: Scan results file (SARIF, etc.)
        in: formData
        name: file
        required: true
        type: file
      - description: API token (alternative to id/slug auth)
        in: header
        name: X-Api-Token
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Scan created with findings count
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Ingest scan results
      tags:
      - Scans
  /applications:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: List of applications
          schema:
            items:
              $ref: '#/definitions/models.Application'
            type: array
      summary: List applications
      tags:
      - Applications
    post:
      consumes:
      - application/json
      parameters:
      - description: Application details
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created application
          schema:
            $ref: '#/definitions/models.Application'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
      summary: Create application
      tags:
      - Applications
  /applications/{id}:
    delete:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Application deleted
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Delete application
      tags:
      - Applications
    get:
      parameters:
      - description: Application ID or slug
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Application with default version
          schema:
            type: object
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Get application
      tags:
      - Applications
    put:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated application
          schema:
            $ref: '#/definitions/models.Application'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Update application
      tags:
      - Applications
  /applications/{id}/ingest:
    post:
      consumes:
      - multipart/form-data
      description: Upload a scan results file. Authenticate via API token header,
        application ID in path, or application slug in path.
      parameters:
      - description: Application ID
        in: path
        name: id
        type: string
      - description: Version name
        in: formData
        name: version
        type: string
      - description: Branch name
        in: formData
        name: branch
        type: string
      - description: Scanner type name
        in: formData
        name: scannerType
        type: string
      - description: Scan results file (SARIF, etc.)
        in: formData
        name: file
        required: true
        type: file
      - description: API token (alternative to id/slug auth)
        in: header
        name: X-Api-Token
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Scan created with findings count
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Ingest scan results
      tags:
      - Scans
  /applications/{id}/permissions:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Subject and action
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Permission revoked
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Permission not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Revoke application permission
      tags:
      - Permissions
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Application policies
          schema:
            items:
              $ref: '#/definitions/controllers.PermissionPolicy'
            type: array
      summary: List application permissions
      tags:
      - Permissions
    post:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Subject (user:{id} or team:{id}) and action (read|write)
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Permission granted
          schema:
            $ref: '#/definitions/gin.H'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: User, team or application not found
          schema:
            $ref: '#/definitions/gin.H'
        "409":
          description: Permission already exists
          schema:
            $ref: '#/definitions/gin.H'
      summary: Grant application permission
      tags:
      - Permissions
  /applications/{id}/regenerate-token:
    post:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: New API token
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Application not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Regenerate API token
      tags:
      - Applications
  /applications/{id}/versions:
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of versions
          schema:
            items:
              $ref: '#/definitions/models.ApplicationVersion'
            type: array
      summary: List versions
      tags:
      - Applications
    post:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Version details
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created version
          schema:
            $ref: '#/definitions/models.ApplicationVersion'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "409":
          description: Version with this name already exists
          schema:
            $ref: '#/definitions/gin.H'
      summary: Create version
      tags:
      - Applications
  /applications/{id}/versions/{versionId}:
    delete:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "404":
          description: Version not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Delete version
      tags:
      - Applications
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Version details with scans
          schema:
            $ref: '#/definitions/models.ApplicationVersion'
        "404":
          description: Version not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Get version
      tags:
      - Applications
    patch:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      - description: Fields to update
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Updated version
          schema:
            $ref: '#/definitions/models.ApplicationVersion'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Version not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Update version
      tags:
      - Applications
  /applications/{id}/versions/{versionId}/findings:
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Version ID
        in: path
        name: versionId
        required: true
        type: string
      - description: Filter by severity
        in: query
        name: severity
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of findings
          schema:
            items:
              $ref: '#/definitions/models.Finding'
            type: array
        "404":
          description: Version not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: List version findings
      tags:
      - Applications
  /applications/{id}/versions/compare:
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Source version ID or name
        in: query
        name: from
        required: true
        type: string
      - description: Target version ID or name
        in: query
        name: to
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Comparison result
          schema:
            $ref: '#/definitions/controllers.CompareResult'
        "400":
          description: Missing from/to params
          schema:
            $ref: '#/definitions/gin.H'
        "404":
          description: Version not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Compare versions
      tags:
      - Applications
  /applications/{id}/webhooks:
    get:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of webhooks
          schema:
            items:
              $ref: '#/definitions/models.Webhook'
            type: array
      summary: List webhooks
      tags:
      - Webhooks
    post:
      consumes:
      - application/json
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Webhook details
        in: body
        name: input
        required: true
        schema:
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created webhook
          schema:
            $ref: '#/definitions/models.Webhook'
        "400":
          description: Invalid input
          schema:
            $ref: '#/definitions/gin.H'
      summary: Create webhook
      tags:
      - Webhooks
  /applications/{id}/webhooks/{webhookId}:
    delete:
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Webhook ID
        in: path
        name: webhookId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No content
        "404":
          description: Webhook not found
          schema:
            $ref: '#/definitions/gin.H'
      summary: Delete webhook
      tags:
      - Webhooks
  /csrf-token:
    get:
      produces:
      - application/json
      responses:
