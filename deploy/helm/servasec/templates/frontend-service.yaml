apiVersion: v1
kind: Service
metadata:
  name: {{ include "servasec.frontendName" . }}
  labels:
    {{- include "servasec.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "servasec.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
