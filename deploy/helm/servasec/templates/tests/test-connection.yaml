apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "servasec.fullname" . }}-test-connection"
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: curl
      image: curlimages/curl
      command: ['curl']
      args:
        - '--fail'
        - 'http://{{ include "servasec.backendName" . }}:8080/ping'
  restartPolicy: Never
