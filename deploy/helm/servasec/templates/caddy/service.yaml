{{- if .Values.ingress.caddy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "servasec.caddyName" . }}
  labels:
    {{- include "servasec.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
    - port: 443
      targetPort: https
      protocol: TCP
      name: https
  selector:
    {{- include "servasec.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
{{- end }}
