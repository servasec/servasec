apiVersion: v1
kind: Service
metadata:
  name: {{ include "servasec.backendName" . }}
  labels:
    {{- include "servasec.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "servasec.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
