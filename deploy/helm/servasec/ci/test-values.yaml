# values override - local k3d cluster with Traefik

replicaCount: 1

imagePullSecrets: []

image:
  backend:
    repository: ghcr.io/servasec/servasec/backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/servasec/servasec/frontend
    tag: latest
    pullPolicy: IfNotPresent

domain:
  name: servasec.local
  publicUrl: "http://servasec.local"

config:
  siteName: servasec
  registrationEnabled: true
  debugEnabled: false
  apiPrefix: /api
  trustedProxiesCidr: "10.0.0.0/8"

ingress:
  traefik:
    enabled: true
    certResolver: ""
    tlsSecretName: ""
    entryPoints:
      - web

postgresql:
  internal: true
  image: postgres:17
  database: servasec-db
  user: servasec
  password: ""
  externalUrl: ""
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi

secrets:
  postgresPassword: "aAx3bBTWyWgGFmKL5y4fA6mklBWLOAl/h81rUbtvP90="
  jwtSecret: "9dnZE4ow5Oi2h/DJI0Nl5a9xwKSIW3/HwLy5FTUkb8Y="
  refreshSecret: "s92Pl24sLFI9Y+31HDw6LPSbxFdfSAoy5Ajsfr6vMrg="
  csrfSecret: "AyczvmvHtjHwcQXlkTbHCoJo830gzdBTyNRQzm4fbZ0="
  adminPassword: "dvpn+OOMZ0ZCSCm6eaINIGq/9uctqKXErounQQKLSTQ="
  licenseKey: ""
  sso:
    githubClientId: ""
    githubClientSecret: ""
    gitlabClientId: ""
    gitlabClientSecret: ""
    gitlabBaseUrl: ""
    oidcClientId: ""
    oidcSecret: ""
    oidcIssuerUrl: ""
    oidcScopes: "openid profile email"

resources:
  backend:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  frontend:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

autoscaling:
  enabled: false

networkPolicy:
  enabled: false
